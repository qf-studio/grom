# grot native dashboard config — Pilot metrics from Prometheus.
# A btop-style overview: headline stats, a gauge + bar gauge, and two charts.
# Run: grot run --config examples/pilot.yaml --prom http://localhost:9093
title: pilot
theme: pilot
refresh: 10s
range: 6h

widgets:
  # Row 1 — headline stats with trend bands (24-col grid, four across).
  - type: stat
    title: success rate
    unit: percentunit
    sparkline: true
    grid: { x: 0, y: 0, w: 6, h: 4 }
    thresholds:
      - color: red
      - value: 0.8
        color: yellow
      - value: 0.95
        color: green
    queries:
      - expr: pilot_success_rate

  - type: stat
    title: tokens
    unit: short
    sparkline: true
    grid: { x: 6, y: 0, w: 6, h: 4 }
    queries:
      - expr: sum(pilot_tokens_consumed_total)

  - type: stat
    title: cost / issue
    unit: currencyUSD
    decimals: 2
    sparkline: true
    grid: { x: 12, y: 0, w: 6, h: 4 }
    queries:
      # `> 0` guards the zero-denominator case: renders "no data", not +Inf.
      - expr: sum(pilot_execution_cost_usd_total) / (sum(pilot_issues_processed_total) > 0)

  - type: stat
    title: prs merged
    unit: short
    sparkline: true
    grid: { x: 18, y: 0, w: 6, h: 4 }
    queries:
      # Lifetime total since pilot#4029 (counters hydrate from the store on boot;
      # PR instrumentation fixed upstream via GH-4093).
      - expr: sum(pilot_prs_merged_total)

  # Row 2 — CI pass gauge + token breakdown bars.
  - type: gauge
    title: ci pass rate
    unit: percentunit
    min: 0
    max: 1
    grid: { x: 0, y: 4, w: 12, h: 6 }
    thresholds:
      - color: red
      - value: 0.8
        color: yellow
      - value: 0.95
        color: green
    queries:
      # Pilot exports no CI-specific pass/fail counter; PR outcomes are the closest
      # proxy (pilot_prs_failed_total also counts approval rejections / merge
      # escalations, not only CI failures).
      # `> 0` guards the zero-denominator case: renders "no data", not +Inf.
      - expr: sum(pilot_prs_merged_total) / ((sum(pilot_prs_merged_total) + sum(pilot_prs_failed_total)) > 0)

  - type: bargauge
    title: tokens by direction
    unit: short
    grid: { x: 12, y: 4, w: 12, h: 6 }
    queries:
      - expr: sum(pilot_tokens_consumed_total) by (direction)
        legend: "{{direction}}"

  # Row 3 — always-defined charts: a cumulative cost curve and stacked token rate.
  # Since pilot#4029 the counter is lifetime (store-hydrated), so the curve is the
  # true all-time spend, not since-restart.
  - type: timeseries
    title: cumulative cost
    unit: currencyUSD
    grid: { x: 0, y: 10, w: 12, h: 8 }
    queries:
      - expr: sum(pilot_execution_cost_usd_total)
        legend: cost

  - type: timeseries
    title: tokens / 5m
    unit: short
    stacked: true
    grid: { x: 12, y: 10, w: 12, h: 8 }
    queries:
      - expr: sum(rate(pilot_tokens_consumed_total[5m])) by (direction)
        legend: "{{direction}}"
